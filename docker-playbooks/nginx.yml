---
- hosts: localhost
  gather_facts: false
  become: true
  vars:
    nginx_image: "nginx"
    nginx_version: "latest"
    nginx_container_name: "nginx"
    nginx_volume: "nginx_data"
    dmz_network: "dmz_network"
    http_port: "80"
    https_port: "443"

  tasks:

    - name: Create nginx volume
      community.docker.docker_volume:
        name: "{{ nginx_volume }}"

    - name: Create dmz network
      community.docker.docker_network:
        name: "{{ dmz_network }}"

    - name: Pull nginx image
      community.docker.docker_image:
        name: "{{ nginx_image }}:{{ nginx_version }}"
        source: pull
        force_source: true

    - name: Run nginx container
      community.docker.docker_container:
        name: "{{ nginx_container_name }}"
        image: "{{ nginx_image }}:{{ nginx_version }}"
        state: started
        restart_policy: unless-stopped
        published_ports:
          - "0.0.0.0:{{ https_port }}:443"
        volumes:
          - "{{ nginx_volume }}:/etc/nginx"
        networks:
          - name: "{{ dmz_network }}"
        healthcheck:
          test: ["CMD-SHELL", "nginx -t || exit 1"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 10s
        memory: "256m"
        cpu_shares: 512
        log_driver: "json-file"
        log_options:
          max-size: "10m"
          max-file: "3"
